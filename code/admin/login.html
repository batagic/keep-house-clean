<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập Admin — Kho Thóc</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/pages/admin.css"/>
</head>
<body>
  <div class="admin-wrap">
    <p class="admin-logo">🌾 Kho Thóc</p>
    <p class="admin-sub">Quản trị mã đổi quà</p>

    <div class="admin-card">
      <h1>Đăng nhập</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" class="form-control" autocomplete="username" required/>
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" class="form-control" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn-main" id="loginBtn">Đăng nhập</button>
        <p class="error-msg hidden" id="loginError"></p>
      </form>
    </div>
  </div>

  <script src="../assets/js/data/config.js"></script>
  <script src="../assets/js/shared/admin-auth.js"></script>
  <script src="../assets/js/pages/admin-login.js"></script>
</body>
</html>
