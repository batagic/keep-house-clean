# Snippet cho Nginx Docker (eedt-nginx) hoặc host Nginx.
# API container: kho-thoc-api:3001, BASE_PATH=/kho-thoc
#
# Sau khi có SSL, URL công khai ví dụ:
#   https://api.tenmien.com/kho-thoc/?type=ping

# ── Cách A: subdomain riêng api.tenmien.com (khuyến nghị) ─────────────────
server {
    listen 443 ssl http2;
    server_name api.tenmien.com;   # ← đổi domain thật

    # ssl_certificate     /etc/letsencrypt/live/api.tenmien.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.tenmien.com/privkey.pem;

    location /kho-thoc/ {
        proxy_pass http://kho-thoc-api:3001/kho-thoc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /kho-thoc {
        return 301 /kho-thoc/;
    }
}

# ── Cách B: host Nginx trên máy (proxy localhost:3001) ────────────────────
# Dùng khi API publish 127.0.0.1:3001 và SSL terminate trên host:
