# Host Nginx — /etc/nginx/sites-available/apinhatkyvumua.taho.cat
# SSL terminate trên HOST, proxy sang kho-thoc-api (Docker :3001)
#
# Cài cert (chạy một lần, trên VPS):
#   sudo certbot certonly --nginx -d apinhatkyvumua.taho.cat
#
# Bật site:
#   sudo ln -sf /etc/nginx/sites-available/apinhatkyvumua.taho.cat \
#               /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name apinhatkyvumua.taho.cat;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name apinhatkyvumua.taho.cat;

    ssl_certificate     /etc/letsencrypt/live/apinhatkyvumua.taho.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apinhatkyvumua.taho.cat/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /kho-thoc/ {
        proxy_pass http://127.0.0.1:3001/kho-thoc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /kho-thoc {
        return 301 /kho-thoc/;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001/health;
    }
}
