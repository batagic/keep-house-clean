# Chỉ dùng NẾU SSL terminate TRONG eedt-nginx (ít gặp với setup :8082->80).
# Thêm vào server block HTTP của eedt-nginx, rồi:
#   docker exec eedt-nginx nginx -t && docker exec eedt-nginx nginx -s reload
#
# Yêu cầu: kho-thoc-api cùng Docker network với eedt-nginx
#   docker network connect <network> kho-thoc-api

location /kho-thoc/ {
    proxy_pass http://kho-thoc-api:3001/kho-thoc/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
